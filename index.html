<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Corrida da Miniaturização - Launcher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0b0704;
      --accent-color: #c47a1e;
      --accent-glow: rgba(196, 122, 30, 0.4);
      --text-color: #f0d89a;
      --wood-color: #1a0f05;
      --border-color: #6b4510;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background-color: var(--bg-color);
      background-image: 
        radial-gradient(circle at center, rgba(196, 122, 30, 0.08) 0%, transparent 70%),
        repeating-linear-gradient(rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 4px);
      font-family: 'Inter', sans-serif;
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .launcher-card {
      background: linear-gradient(135deg, #1e130a 0%, #0f0a05 100%);
      border: 3px solid var(--border-color);
      outline: 1.5px solid #d4a030;
      outline-offset: -6px;
      border-radius: 24px;
      padding: 3.5rem 2.5rem;
      text-align: center;
      max-width: 580px;
      width: 90%;
      box-shadow: 
        0 30px 70px rgba(0, 0, 0, 0.95),
        inset 0 0 40px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.2rem;
      animation: launcher-fade-in 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }

    @keyframes launcher-fade-in {
      from {
        opacity: 0;
        transform: scale(0.95) translateY(20px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .logo-container {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 0.5rem;
    }

    .game-logo {
      max-width: 420px;
      width: 90%;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 0 15px rgba(0, 0, 0, 0.7));
      animation: logo-float 4s ease-in-out infinite;
    }

    @keyframes logo-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .subtitle {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      color: var(--accent-color);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: -1rem;
      text-shadow: 0 0 8px var(--accent-glow);
    }

    .btn-launch {
      position: relative;
      background: linear-gradient(180deg, #d4a030 0%, #a07840 50%, #6b4510 100%);
      border: 3.5px solid #6b4510;
      outline: 1.5px dashed #d4a030;
      outline-offset: -6px;
      color: #f0d89a;
      font-family: 'Cinzel', serif;
      font-size: 1.4rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-radius: 12px;
      padding: 1.25rem 3rem;
      cursor: pointer;
      box-shadow: 
        inset 0 0 15px rgba(255, 255, 255, 0.15),
        0 8px 20px rgba(0,0,0,0.6);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
      user-select: none;
    }

    .btn-launch:hover {
      background: linear-gradient(180deg, #ffe082 0%, #c47a1e 50%, #8b5e1a 100%);
      box-shadow: 
        inset 0 0 15px rgba(255, 255, 255, 0.3),
        0 0 25px var(--accent-color),
        0 10px 25px rgba(0,0,0,0.7);
      transform: translateY(-2px) scale(1.03);
    }

    .btn-launch:active {
      transform: translateY(1px) scale(0.97);
      box-shadow: 
        inset 0 0 20px rgba(0,0,0,0.6),
        0 0 10px var(--accent-color);
    }

    .status-message {
      font-size: 0.95rem;
      color: #a07840;
      line-height: 1.6;
      max-width: 380px;
      display: none;
      animation: text-fade-in 0.5s ease forwards;
    }

    @keyframes text-fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .status-message span {
      display: block;
      margin-top: 8px;
      font-weight: 600;
      color: #8b5e1a;
      cursor: pointer;
      text-decoration: underline;
    }

    .status-message span:hover {
      color: var(--accent-color);
    }
  </style>
</head>
<body>

  <div class="launcher-card">
    <div class="logo-container">
      <img class="game-logo" src="assets/images/sprites/titulo.png" alt="A Corrida da Miniaturização Logo">
    </div>
    
    <div class="subtitle">Corrida Pela Miniaturização</div>

    <button class="btn-launch" id="btn-launch">Iniciar Jogo</button>

    <div class="status-message" id="status-msg">
      O jogo está rodando em outra janela.<br>Você pode fechar esta aba.
      <span id="btn-reopen">Reabrir Janela do Jogo</span>
    </div>
  </div>

  <script>
    const btnLaunch = document.getElementById('btn-launch');
    const statusMsg = document.getElementById('status-msg');
    const btnReopen = document.getElementById('btn-reopen');

    function launchGame() {
      // Configuracoes da janela popup estilo app nativo
      const width = 1280;
      const height = 720;
      const left = (window.screen.width - width) / 2;
      const top = (window.screen.height - height) / 2;

      const windowParams = `width=${width},height=${height},left=${left},top=${top},menubar=no,toolbar=no,location=no,status=no,resizable=yes`;
      
      const gameWindow = window.open('game.html', 'ComputerEvolutionGame', windowParams);

      if (gameWindow) {
        btnLaunch.style.display = 'none';
        statusMsg.style.display = 'block';
      } else {
        alert('O bloqueador de pop-ups do seu navegador impediu a abertura do jogo. Por favor, autorize pop-ups para este site e tente novamente.');
      }
    }

    btnLaunch.addEventListener('click', launchGame);
    btnReopen.addEventListener('click', launchGame);
  </script>
</body>
</html>
